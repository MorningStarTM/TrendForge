services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trendforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trendforge}
      POSTGRES_DB: ${POSTGRES_DB:-trendforge}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  # Ingestion (scraping) and the Data Pool it feeds run in-process inside
  # `backend`, not as separate Celery worker/beat services — the Data Pool
  # is an in-memory, single-process store (see
  # backend/app/services/ingestion/data_pool.py), so a separate worker
  # process couldn't see it anyway. Redis stays available for a future
  # Celery use (e.g. image generation, publishing) if that turns out to
  # need a task queue.
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
