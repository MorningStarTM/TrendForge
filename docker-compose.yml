services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trendforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trendforge}
      POSTGRES_DB: ${POSTGRES_DB:-trendforge}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
      dockerfile: workers/Dockerfile
    restart: unless-stopped
    env_file: .env
    command: ["uv", "run", "celery", "-A", "app.celery_app", "worker", "--loglevel=info"]
    depends_on:
      - postgres
      - redis

  beat:
    build:
      context: .
      dockerfile: workers/Dockerfile
    restart: unless-stopped
    env_file: .env
    command: ["uv", "run", "celery", "-A", "app.celery_app", "beat", "--loglevel=info"]
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
